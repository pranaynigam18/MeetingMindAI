{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Ask MeetingMind</h1>

    <p class="subtitle">
        Search your organization's memory
    </p>

    <form method="POST" action="/ask">

        <input
            type="text"
            name="question"
            value="{{ question if question else '' }}"
            placeholder="What database decisions have we made?"
            required
        >

        <button type="submit">
            Ask
        </button>

    </form>

    {% if answer %}

    <div class="answer">

        <h3>Answer</h3>

        <p>{{ answer }}</p>

    </div>

    {% endif %}

</div>

{% endblock %}
